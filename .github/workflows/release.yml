name: Release

on:
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          version=$(grep -oP '(?<=VERSION = ")[^"]+' lib/helmsnap/version.rb)
          echo "tag=v$version" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ruby/setup-ruby@v1
        if: steps.check.outputs.exists == 'false'
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Build gem
        if: steps.check.outputs.exists == 'false'
        run: gem build helmsnap.gemspec

      - name: Push gem to RubyGems
        if: steps.check.outputs.exists == 'false'
        run: gem push *.gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.GEM_HOST_API_KEY }}

      - uses: docker/login-action@v4
        if: steps.check.outputs.exists == 'false'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        if: steps.check.outputs.exists == 'false'
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}

      - uses: docker/build-push-action@v7
        if: steps.check.outputs.exists == 'false'
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - uses: softprops/action-gh-release@v3
        if: steps.check.outputs.exists == 'false'
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: "*.gem"
          generate_release_notes: true
